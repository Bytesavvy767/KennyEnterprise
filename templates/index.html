{% extends "base.html" %}

{% block content %}
<h1>Products</h1>
<div class="row">
    {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 product-card">
                {% if product.image_path %}
                <img src="{{ url_for('static', filename='images/' + product.image_path) }}" class="card-img-top" alt="{{ product.name }}">
                {% endif %}
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text">{{ product.description }}</p>
                    <p class="card-text mt-auto"><strong>KSh {{ "%.2f"|format(product.price) }}</strong></p>
                    <div class="d-flex gap-2 mt-3">
                        <a href="{{ url_for('product_detail', product_id=product.id) }}" class="btn btn-outline-primary flex-fill">View Details</a>
                        <form method="post" action="{{ url_for('add_to_cart', product_id=product.id) }}" class="d-inline">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
